<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MockOverflow - Segments</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(120deg, #f6f8fa 0%, #eaf2fb 100%);
      margin: 0;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .logo-container {
      margin-bottom: 40px;
      text-align: center;
    }

    .segments-list {
      display: flex;
      flex-direction: column;
      gap: 60px;
      width: 100%;
      max-width: 1200px;
      padding: 0 20px;
    }

    .segment {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      min-height: 600px;
    }

    .slider-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
      max-width: 400px;
    }

    .nav-arrow {
      display: none;
      background: #e0e7ff;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      color: #5E60CE;
      box-shadow: 0 4px 12px rgba(94, 96, 206, 0.15);
      transition: background 0.2s, transform 0.2s, opacity 0.3s;
      z-index: 20;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }

    .nav-arrow:hover {
      background: #c7d2fe;
      transform: translateY(-50%) scale(1.05);
    }

    .nav-arrow.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .prev-btn { left: -40px; }
    .next-btn { right: -40px; }

    @media (min-width: 1024px) {
      .nav-arrow {
        display: flex;
      }
    }

    .phone-slider {
      display: flex;
      width: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .phone-slider::-webkit-scrollbar {
      display: none;
    }

    .phone-item {
      flex: 0 0 100%; 
      scroll-snap-align: center;
      scroll-snap-stop: always;
      display: flex;
      justify-content: center;
      will-change: transform;
    }

    .phone-view {
      width: 280px;
      height: 560px;
      border: 12px solid #424242;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      background: #000;
    }

    .image-container {
      position: absolute;
      top: 0;
      left: 0;
      height: 110vh;
      width: 100%;
      transition: transform 8s cubic-bezier(0.62, 0.21, 0.38, 0.95);
      will-change: transform;
    }

    .image-container img {
      height: 100%;
      width: 130%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .image-container img.loaded {
      opacity: 1;
    }

    .wall-art-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      transform: scale(0.4) translateY(-20%);
      transform-origin: center center;
      transition: transform 2s cubic-bezier(0.56, 0.1, 0.92, 0.9);
      will-change: transform;
      filter: brightness(0.95);
    }

    .open-camera-btn {
      position: absolute;
      text-decoration: none;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      padding: 14px 0;
      background-image: linear-gradient(90deg, #5E60CE 0%, #3A0CA3 100%);
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      z-index: 10;
      text-align: center;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <img width="220" src="https://mockoverflow.online/media/mockoverflow-phone.png" alt="MockOverflow Logo">
  </div>

  <div class="segments-list" id="segmentsList">
    <!-- Dynamic Segments Loaded Here -->
  </div>

  <script>
    const stickerData = {
      baseImages: {
        laptopPalm: "https://mockoverflow.online/files/stickers/laptop-palm.jpg",
        laptopBack: "https://mockoverflow.online/files/stickers/laptop-back.jpg",
        tablet: "https://mockoverflow.online/files/stickers/tablet.jpg",
        phone: "https://mockoverflow.online/files/stickers/phone.jpg"
      },
      stickers: [
        { id: 1, url: "https://mockoverflow.online/media/sticker-demo.png?t=8", compatibleBgs: ["laptopPalm", "laptopBack", "tablet", "phone"] },
        { id: 2, url: "https://mockoverflow.online/sticker/1/asset.png", compatibleBgs: ["laptopPalm", "laptopBack", "tablet", "phone"] },
        { id: 3, url: "https://png.pngtree.com/png-clipart/20230916/original/pngtree-die-cut-sticker-of-a-little-girl-with-long-hair-clipart-png-image_12247691.png", compatibleBgs: ["laptopPalm", "laptopBack", "tablet", "phone"] },
        { id: 4, url: "https://png.pngtree.com/png-vector/20240628/ourmid/pngtree-cute-boba-kawaii-cartoon-simple-die-cut-sticker-png-image_12730541.png", compatibleBgs: ["laptopPalm", "laptopBack", "tablet", "phone"] },
      ]
    };

    // Reverse stickers so last entry shows first
    stickerData.stickers.reverse();

    let loadedIndex = -1;
    const list = document.getElementById('segmentsList');
    const observerOptions = { root: null, threshold: 0.05, rootMargin: "200px" };
    
    // Observer for segment lazy loading and pagination
    const segmentObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const index = parseInt(entry.target.dataset.index);
          // Preload logic: maintain +2 segment margin
          loadUntil(index + 2);
          loadSliderImages(entry.target);
        }
      });
    }, observerOptions);

    function createSegmentHtml(sticker, index) {
      const segment = document.createElement('div');
      segment.className = 'segment';
      segment.dataset.index = index;
      
      let sliderHtml = `
        <div class="slider-wrapper">
          <button class="nav-arrow prev-btn hidden" aria-label="Previous">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <div class="phone-slider">
      `;

      sticker.compatibleBgs.forEach(bgKey => {
        const bgUrl = stickerData.baseImages[bgKey];
        sliderHtml += `
          <div class="phone-item">
            <div class="phone-view">
              <div class="image-container">
                <img data-src="${bgUrl}" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Loading...">
              </div>
              <div class="wall-art-overlay" style="background-image: url('${sticker.url}')"></div>
              <a href="show/sticker/?id=${sticker.id}" class="open-camera-btn">Open Camera</a>
            </div>
          </div>
        `;
      });

      const nextHiddenClass = sticker.compatibleBgs.length <= 1 ? 'hidden' : '';
      sliderHtml += `
          </div>
          <button class="nav-arrow next-btn ${nextHiddenClass}" aria-label="Next">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>
      `;
      
      segment.innerHTML = sliderHtml;
      return segment;
    }

    function loadSliderImages(segment) {
      const images = segment.querySelectorAll('.image-container img[data-src]');
      images.forEach(img => {
        if (img.dataset.src) {
          img.src = img.dataset.src;
          img.removeAttribute('data-src');
          img.onload = () => img.classList.add('loaded');
        }
      });
    }

    function initSliderLogic(segment) {
      const slider = segment.querySelector('.phone-slider');
      const prevBtn = segment.querySelector('.prev-btn');
      const nextBtn = segment.querySelector('.next-btn');

      const updateArrows = () => {
        const scrollLeft = slider.scrollLeft;
        const maxScroll = slider.scrollWidth - slider.clientWidth;
        
        if (scrollLeft <= 10) {
          prevBtn.classList.add('hidden');
        } else {
          prevBtn.classList.remove('hidden');
        }
        
        if (scrollLeft >= maxScroll - 10) {
          nextBtn.classList.add('hidden');
        } else {
          nextBtn.classList.remove('hidden');
        }
      };

      slider.addEventListener('scroll', updateArrows);
      nextBtn.addEventListener('click', () => {
        slider.scrollBy({ left: slider.clientWidth, behavior: 'smooth' });
      });
      prevBtn.addEventListener('click', () => {
        slider.scrollBy({ left: -slider.clientWidth, behavior: 'smooth' });
      });
      
      setTimeout(updateArrows, 100);
    }

    function loadUntil(targetIndex) {
      const maxIndex = stickerData.stickers.length - 1;
      const limit = Math.min(targetIndex, maxIndex);
      
      while (loadedIndex < limit) {
        loadedIndex++;
        const sticker = stickerData.stickers[loadedIndex];
        const segmentNode = createSegmentHtml(sticker, loadedIndex);
        list.appendChild(segmentNode);
        initSliderLogic(segmentNode);
        segmentObserver.observe(segmentNode);
        
        // Ensure initial loaded segments have their images prepped
        if (loadedIndex <= 2) {
          loadSliderImages(segmentNode);
        }
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Pagination: Load initial 3 segments (max 3 at load)
      loadUntil(2);

      let step = 0;
      function animateAll() {
        const segments = document.querySelectorAll('.segment');
        const viewportHeight = window.innerHeight;

        segments.forEach(segment => {
          const rect = segment.getBoundingClientRect();
          
          if (rect.top < viewportHeight && rect.bottom > 0) {
            const items = segment.querySelectorAll('.phone-item');
            
            items.forEach(item => {
              const itemRect = item.getBoundingClientRect();
              const view = item.querySelector('.phone-view');
              const imageContainer = view.querySelector('.image-container');
              const wallArt = view.querySelector('.wall-art-overlay');
              const img = imageContainer.querySelector('img');

              const isHorizontallyVisible = itemRect.left < (window.innerWidth / 2 + 150) && itemRect.right > (window.innerWidth / 2 - 150);

              if (isHorizontallyVisible && img.classList.contains('loaded')) {
                switch (step % 5) {
                  case 0: imageContainer.style.transform = "translateX(-20px) translateY(0)"; break;
                  case 1: imageContainer.style.transform = "translateX(-10px) translateY(0)"; break;
                  case 2: imageContainer.style.transform = "translateX(-5px) translateY(-15px)"; break;
                  case 3: imageContainer.style.transform = "translateX(-10px) translateY(15px)"; break;
                  case 4: imageContainer.style.transform = "translateX(0) translateY(0)"; break;
                }

                switch (step % 10) {
                  case 0: wallArt.style.transform = "scale(0.6) translateY(-20%) rotate(50deg)"; break;
                  case 1: wallArt.style.transform = "scale(0.4) translateY(-30%) rotate(40deg)"; break;
                  case 2: wallArt.style.transform = "scale(0.55) translateY(-18%) rotate(25deg)"; break;
                  case 3: wallArt.style.transform = "scale(0.64) translateY(-21%) rotate(30deg)"; break;
                  case 4: wallArt.style.transform = "scale(0.45) translateY(-20%) rotate(35deg)"; break;
                  case 5: wallArt.style.transform = "scale(0.38) translateY(-28%) rotate(40deg)"; break;
                  case 6: wallArt.style.transform = "scale(0.5) translateY(-18%) rotate(6deg)"; break;
                  case 7: wallArt.style.transform = "scale(0.4) translateY(-23%) rotate(0deg)"; break;
                  case 8: wallArt.style.transform = "scale(0.55) translateY(-19%) rotate(50deg)"; break;
                  case 9: wallArt.style.transform = "scale(0.4) translateY(-25%) rotate(40deg)"; break;
                }
              }
            });
          }
        });
        step++;
      }

      setInterval(animateAll, 5000);
      animateAll();
    });
  </script>
</body>
</html>
